<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Literacy Certification</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="hero">
<div class="logo">✦ AI Literacy Certification</div>
<h1>AIを使う力を、社会で証明する。</h1>
<p>AI時代に必要な「理解力・活用力・判断力」を測定する次世代AI資格。</p>
<button onclick="startExam()">AIチャット試験を開始</button>
</header>

<section id="exam" class="panel hidden">
<h2>AI試験官</h2>
<div id="chat"></div>
<input id="answer" placeholder="回答を入力してください">
<button onclick="submitAnswer()">送信</button>
</section>

<section id="result" class="panel hidden"></section>

<section class="cards">
<div class="card"><h3>Basic</h3><p>AI基礎理解</p></div>
<div class="card"><h3>Professional</h3><p>業務活用力</p></div>
<div class="card"><h3>Expert</h3><p>AI戦略設計力</p></div>
</section>

<script src="app.js"></script>
</body>
</html>
